version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: don_atento_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: don_atento_db
    ports:
      - "5432:5432"
    volumes:
      - don_atento_pgdata:/var/lib/postgresql/data

volumes:
  don_atento_pgdata:
