# Render Blueprint — Don Atento
# https://render.com/docs/blueprint-spec

services:
  # ── API Backend ──────────────────────────────────────────────────────────────
  - type: web
    name: don-atento-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false  # Set manually after Vercel deploy
      - key: DATABASE_URL
        sync: false  # Set manually (Supabase connection string)
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false  # Set manually (128-char secret: openssl rand -hex 64)
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_ENCRYPTION_KEY
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false  # Meta App Secret — required for webhook signature validation
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false  # Required for webhook subscription verification
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: atento-media
      - key: DIAN_ENCRYPTION_KEY
        sync: false  # Set manually (64-char hex; openssl rand -hex 32)
      - key: DIAN_TRANSMISSION_ENABLED
        value: "false"  # Literal "true" to enable real DIAN SOAP transmission
      - key: DIAN_WSDL_URL
        sync: false  # Defaults to habilitación; set production URL when ready
      - key: REDIS_URL
        fromService:
          name: don-atento-redis
          type: redis
          property: connectionString

  # ── Redis (WhatsApp conversation state) ──────────────────────────────────────
  - type: redis
    name: don-atento-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
